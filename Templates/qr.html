<!DOCTYPE html>
<html lang="en">
<head>
    <!-- SEO -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator & Scanner | GoFormate</title>

    <meta name="description"
          content="Generate and scan QR codes instantly with GoFormate. Free, fast and secure QR code generator and QR scanner online.">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
          rel="stylesheet">

    <link rel="shortcut icon"
          href="{{ url_for('static', filename='images/logo.png') }}"
          type="image/x-icon">

<style>
:root {
    --bg-main: #050505;
    --nav-bg: rgba(15, 15, 15, 0.6);
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);
    --card-hover: rgba(255,255,255,.05);
    --text-main: #ffffff;
    --text-muted: #8892b0;
    --search-bg: rgba(255,255,255,.03);

    --accent-1:orange; --accent-2:orangered; --accent-3:red;
}

body.light-mode {
    --bg-main: #f0f4f8;
    --nav-bg: rgba(255,255,255,.6);
    --card-bg: rgba(255,255,255,.7);
    --card-border: rgba(0,0,0,.08);
    --card-hover: rgba(255,255,255,.9);
    --text-main: #0f172a;
    --text-muted: #475569;
    --search-bg: rgba(255,255,255,.9);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    background:var(--bg-main);
    color:var(--text-main);
    min-height:100vh;
    overflow-x:hidden;
    transition:.35s ease;
}

/* Ambient glow */
.ambient-glow{
    position:fixed;
    border-radius:50%;
    filter:blur(150px);
    z-index:-1;
    opacity:.35;
}

.glow-1{
    top:-10%;
    left:-10%;
    width:45vw;
    height:45vw;
    background:rgba(0,242,254,.15);
}

.glow-2{
    bottom:-10%;
    right:-10%;
    width:55vw;
    height:55vw;
    background:rgba(240,147,251,.15);
}

/* Layout */
.workspace{
    max-width:1300px;
    margin:0 auto;
    padding:20px 20px 80px;
}

/* NAVBAR - same as index */
.glass-nav{
    position:sticky;
    top:20px;
    z-index:100;
    background:var(--nav-bg);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--card-border);
    border-radius:50px;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
}

.nav-brand{
    font-size:1.5rem;
    font-weight:800;
    background:linear-gradient(to right,var(--accent-1),var(--accent-3));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:10px;
}

.nav-controls{
    display:flex;
    align-items:center;
    gap:20px;
}

.nav-link{
    color:var(--text-main);
    text-decoration:none;
    font-weight:500;
    opacity:.85;
}

.nav-link:hover{
    color:var(--accent-1);
}

.theme-toggle{
    background:none;
    border:none;
    color:var(--text-main);
    font-size:1.2rem;
    cursor:pointer;
    width:40px;
    height:40px;
    border-radius:50%;
    background:var(--card-bg);
    border:1px solid var(--card-border);
}

.btn-premium{
    background:linear-gradient(135deg,var(--accent-2),var(--accent-3));
    padding:10px 24px;
    border-radius:30px;
    font-weight:600;
    color:#fff;
    text-decoration:none;
}

/* Hero */
.hero{
    text-align:center;
    margin-bottom:55px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:15px;
}

.hero p{
    color:var(--text-muted);
    max-width:720px;
    margin:auto;
    line-height:1.8;
}

/* Grid */
.tool-wrapper{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

/* Cards */
.card{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:28px;
    padding:32px;
    backdrop-filter:blur(14px);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
    background:var(--card-hover);
}

.card-title{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.35rem;
    margin-bottom:25px;
}

.card-title i{
    color:var(--accent-1);
}

/* Inputs */
.input-box{
    width:100%;
    padding:16px 18px;
    border:none;
    outline:none;
    border-radius:16px;
    background:var(--search-bg);
    border:1px solid var(--card-border);
    color:var(--text-main);
    margin-bottom:20px;
}

.btn{
    width:100%;
    border:none;
    padding:16px;
    border-radius:16px;
    cursor:pointer;
    font-size:1rem;
    font-weight:600;
    color:white;
    transition:.3s;
}

.generate{
    background:linear-gradient(135deg,var(--accent-2),var(--accent-3));
}

.scan{
    background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
}

.btn:hover{
    transform:translateY(-2px);
}

/* QR Preview */
.qr-display{
    width:240px;
    height:240px;
    object-fit:contain;
    margin-top:25px;
    background:white;
    padding:15px;
    border-radius:20px;
    display:none;
}

.download-btn{
    display:none;
    margin-top:18px;
    text-decoration:none;
    background:linear-gradient(135deg,var(--accent-2),var(--accent-3));
    color:white;
    padding:14px 24px;
    border-radius:14px;
    font-weight:600;
}

/* Upload */
.file-label{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:20px;
    border-radius:18px;
    border:2px dashed rgba(79,172,254,.25);
    cursor:pointer;
    color:var(--text-muted);
}

.file-label:hover{
    border-color:var(--accent-1);
}

.scan-result{
    margin-top:20px;
    background:rgba(255,255,255,.03);
    padding:20px;
    border-radius:16px;
    display:none;
    word-break:break-word;
}

/* Responsive */
@media(max-width:900px){
    .tool-wrapper{
        grid-template-columns:1fr;
    }
}

@media(max-width:650px){
    .glass-nav{
        padding:15px;
        border-radius:20px;
        flex-direction:column;
        gap:15px;
    }

    .nav-controls{
        flex-wrap:wrap;
        justify-content:center;
    }

    .hero h1{
        font-size:2rem;
    }

    .card{
        padding:24px;
    }
}
</style>
</head>

<body>

<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<div class="workspace">

    <nav class="glass-nav">
        <a href="/" class="nav-brand">
            <i class="fa-solid fa-shapes"></i> GoFormate
        </a>

        <div class="nav-controls">
            <a href="/" class="nav-link">Home</a>

            <button class="theme-toggle" id="themeToggle">
                <i class="fa-solid fa-sun" id="themeIcon"></i>
            </button>

            <a href="/form" class="btn-premium">Build CV ✨</a>
        </div>
    </nav>

    <div class="hero">
        <h1>QR Code Generator & Scanner</h1>
        <p>
            Generate QR codes instantly or scan QR code images directly from your device —
            fast, secure and free with GoFormate.
        </p>
    </div>

    <div class="tool-wrapper">

        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-qrcode"></i>
                Generate QR Code
            </div>

            <form id="generateForm">
                <input type="text"
                       class="input-box"
                       id="qrText"
                       placeholder="Enter URL or text..."
                       required>

                <button type="submit" class="btn generate">
                    Generate QR
                </button>
            </form>

            <div style="text-align:center;">
                <img id="generatedImage" class="qr-display">

                <br>

                <a id="downloadLink"
                   class="download-btn"
                   download="qr_code.png">
                   Download QR
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-camera"></i>
                Scan QR Code
            </div>

            <form id="scanForm" enctype="multipart/form-data">

                <input type="file"
                       id="qrFile"
                       name="qr_image"
                       accept="image/*"
                       hidden
                       required>

                <label for="qrFile" class="file-label">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span id="fileText">Choose QR Image</span>
                </label>

                <br><br>

                <button type="submit" class="btn scan">
                    Scan QR
                </button>
            </form>

            <div id="scanResult" class="scan-result"></div>
        </div>

    </div>
</div>


<style>

/* PAGE LOADER */
#pageLoader{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg-main);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity .6s ease, visibility .6s ease;
}

#pageLoader.hide{
    opacity: 0;
    visibility: hidden;
}

.loader-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.loader-icon{
    font-size: 8rem;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: spinPulse 1.6s infinite ease-in-out;
}

.loader-box p{
    color: var(--text-muted);
    font-size: 1rem;
    letter-spacing: .5px;
}

@keyframes spinPulse{
    0%{
        transform: rotate(0deg) scale(1);
        opacity:.7;
    }
    50%{
        transform: rotate(180deg) scale(1.25);
        opacity:1;
    }
    100%{
        transform: rotate(360deg) scale(1);
        opacity:.7;
    }
}

</style>

<div id="pageLoader">
    <div class="loader-box">
        <i class="fa-solid fa-shapes loader-icon"></i>
    </div>
</div>

<script>

/* PAGE LOADER */
window.addEventListener("load", () => {
    const loader = document.getElementById("pageLoader");

    setTimeout(() => {
        loader.classList.add("hide");
    }, 800);
});

</script>


<script>
// theme
const themeToggleBtn = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');

if(localStorage.getItem('theme') === 'light'){
    document.body.classList.add('light-mode');
    themeIcon.classList.replace('fa-sun','fa-moon');
}

themeToggleBtn.addEventListener('click',()=>{
    document.body.classList.toggle('light-mode');

    if(document.body.classList.contains('light-mode')){
        themeIcon.classList.replace('fa-sun','fa-moon');
        localStorage.setItem('theme','light');
    } else{
        themeIcon.classList.replace('fa-moon','fa-sun');
        localStorage.setItem('theme','dark');
    }
});

// generate QR
document.getElementById('generateForm')
.addEventListener('submit', async function(e){
    e.preventDefault();

    const text = document.getElementById('qrText').value;
    const formData = new FormData();
    formData.append('data', text);

    const img = document.getElementById('generatedImage');
    const downloadLink = document.getElementById('downloadLink');

    const response = await fetch('/generate',{
        method:'POST',
        body:formData
    });

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    img.src = url;
    img.style.display='block';

    downloadLink.href=url;
    downloadLink.style.display='inline-block';
});

// filename
document.getElementById('qrFile')
.addEventListener('change', function(){
    document.getElementById('fileText').innerText =
        this.files[0]?.name || 'Choose QR Image';
});

// scan
document.getElementById('scanForm')
.addEventListener('submit', async function(e){
    e.preventDefault();

    const fileInput =
        document.getElementById('qrFile');

    if(!fileInput.files.length) return;

    const formData = new FormData();
    formData.append('qr_image', fileInput.files[0]);

    const resultDiv =
        document.getElementById('scanResult');

    resultDiv.style.display='block';
    resultDiv.innerHTML="<strong>Scanning...</strong>";

    const response = await fetch('/scan',{
        method:'POST',
        body:formData
    });

    const text = await response.text();

    resultDiv.innerHTML =
        `<strong>Result:</strong><br>${text}`;
});
</script>

</body>
</html>
