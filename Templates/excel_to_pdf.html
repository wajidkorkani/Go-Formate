<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Excel to PDF Converter | MyCVSite</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/x-icon">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(rgba(15,23,42,0.92),
            rgba(15,23,42,0.92)),
            url('/static/images/slider1.jpg');

            background-size:cover;
            background-position:center;

            color:white;
        }

        /* MAIN */

        .container{

            width:90%;
            max-width:760px;

            margin:auto;

            padding-top:150px;
            padding-bottom:50px;
        }

        .converter-card{

            background:rgba(15,23,42,0.72);

            border:
            1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(14px);

            border-radius:28px;

            padding:45px;

            text-align:center;

            box-shadow:
            0 25px 60px rgba(0,0,0,0.45);
        }

        .icon{

            width:95px;
            height:95px;

            margin:auto;
            margin-bottom:25px;

            border-radius:24px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:
            rgba(34,197,94,0.12);
        }

        .icon i{

            font-size:42px;

            color:#22c55e;
        }

        h1{

            font-size:2.4rem;

            margin-bottom:15px;
        }

        p{

            color:#cbd5e1;

            line-height:1.8;

            margin-bottom:35px;
        }

        /* FILE INPUT */

        .custom-file-upload{

            width:100%;

            margin-bottom:25px;
        }

        .file-label{

            width:100%;

            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;

            padding:20px;

            border-radius:18px;

            background:#1e293b;

            border:
            2px dashed rgba(56,189,248,0.35);

            color:#cbd5e1;

            cursor:pointer;

            transition:0.3s;

            font-size:15px;
        }

        .file-label i{

            font-size:22px;

            color:#38bdf8;
        }

        .file-label:hover{

            border-color:#38bdf8;

            background:#243447;

            transform:translateY(-2px);
        }

        /* BUTTON */

        .submit-btn{

            width:100%;

            border:none;

            padding:18px;

            border-radius:16px;

            cursor:pointer;

            font-size:1rem;
            font-weight:bold;

            color:white;

            transition:0.3s;

            background:
            linear-gradient(135deg,#22c55e,#16a34a);

            box-shadow:
            0 15px 35px rgba(34,197,94,0.3);
        }

        .submit-btn:hover{
            transform:translateY(-3px);
        }

        /* FEATURES */

        .features{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(180px,1fr));

            gap:18px;

            margin-top:35px;
        }

        .feature{

            background:#1e293b;

            padding:18px;

            border-radius:18px;

            border:
            1px solid rgba(255,255,255,0.05);
        }

        .feature i{

            font-size:24px;

            color:#38bdf8;

            margin-bottom:12px;
        }

        .feature h3{

            font-size:1rem;

            margin-bottom:8px;
        }

        .feature p{

            margin:0;

            font-size:14px;

            color:#94a3b8;
        }

        /* MOBILE */

        @media(max-width:768px){

            .nav-container{
                flex-direction:column;
                gap:15px;
            }

            .converter-card{
                padding:30px;
            }

            h1{
                font-size:2rem;
            }
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

{% include 'nav.html' %}

    <!-- MAIN -->

    <div class="container">

        <div class="converter-card">

            <!-- ICON -->

            <div class="icon">

                <i class="fa-solid fa-file-excel"></i>

            </div>

            <!-- TITLE -->

            <h1>
                Excel to PDF Converter
            </h1>

            <p>
                Upload Excel files (.xls, .xlsx) and convert them
                into clean, professional PDF documents instantly.
            </p>

            <!-- FORM -->

            <form method="POST"
            enctype="multipart/form-data">

                <!-- FILE INPUT -->

                <div class="custom-file-upload">

                    <input type="file"
                    name="file"
                    id="excelInput"
                    accept=".xlsx,.xls"
                    required
                    hidden>

                    <label for="excelInput"
                    class="file-label">

                        <i class="fa-solid fa-cloud-arrow-up"></i>

                        <span id="fileText">
                            Choose Excel File
                        </span>

                    </label>

                </div>

                <!-- BUTTON -->

                <button type="submit"
                class="submit-btn">

                    <i class="fa-solid fa-file-pdf"></i>

                    Convert Now

                </button>

            </form>

            <!-- FEATURES -->

            <div class="features">

                <div class="feature">

                    <i class="fa-solid fa-bolt"></i>

                    <h3>Fast Conversion</h3>

                    <p>
                        Convert spreadsheets quickly.
                    </p>

                </div>

                <div class="feature">

                    <i class="fa-solid fa-lock"></i>

                    <h3>Secure</h3>

                    <p>
                        Your files are safe and private.
                    </p>

                </div>

                <div class="feature">

                    <i class="fa-solid fa-table"></i>

                    <h3>Accurate Layout</h3>

                    <p>
                        Keeps table structure intact.
                    </p>

                </div>

            </div>

        </div>

    </div>

<script>

    // SHOW FILE NAME

    const excelInput =
    document.getElementById('excelInput');

    const fileText =
    document.getElementById('fileText');

    excelInput.addEventListener('change', function(){

        if(this.files.length > 0){

            fileText.textContent =
            this.files[0].name;

        }else{

            fileText.textContent =
            "Choose Excel File";

        }

    });

</script>

</body>
</html>
