<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Excel to PDF | GoFormate</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="shortcut icon"
href="{{ url_for('static', filename='images/logo.png') }}">

<style>

/* =========================
   SAME THEME AS INDEX
========================= */
:root{
    --bg-main:#050505;
    --nav-bg:rgba(15,15,15,.6);
    --card-bg:rgba(255,255,255,.03);
    --card-border:rgba(255,255,255,.08);
    --text-main:#ffffff;
    --text-muted:#8892b0;

    --accent-1:orange; --accent-2:orangered; --accent-3:red;
}

body.light-mode{
    --bg-main:#f0f4f8;
    --nav-bg:rgba(255,255,255,.6);
    --card-bg:rgba(255,255,255,.75);
    --card-border:rgba(0,0,0,.08);
    --text-main:#0f172a;
    --text-muted:#475569;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    background:var(--bg-main);
    color:var(--text-main);
    min-height:100vh;
    overflow-x:hidden;
    transition:.35s ease;
}

/* GLOWS */
.ambient-glow{
    position:fixed;
    border-radius:50%;
    filter:blur(150px);
    z-index:-1;
    opacity:.4;
}

.glow-1{
    top:-10%;
    left:-10%;
    width:50vw;
    height:50vw;
    background:rgba(0,242,254,.15);
}

.glow-2{
    bottom:-20%;
    right:-10%;
    width:60vw;
    height:60vw;
    background:rgba(240,147,251,.15);
}

/* WORKSPACE */
.workspace{
    max-width:1300px;
    margin:auto;
    padding:20px 20px 80px;
}

/* NAV (same as index) */
.glass-nav{
    position:sticky;
    top:20px;
    z-index:100;
    background:var(--nav-bg);
    backdrop-filter:blur(20px);
    border:1px solid var(--card-border);
    border-radius:50px;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
}

.nav-brand{
    font-size:1.5rem;
    font-weight:800;
    background:linear-gradient(to right,var(--accent-1),var(--accent-3));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-decoration:none;
}

.nav-controls{
    display:flex;
    align-items:center;
    gap:18px;
}

.nav-controls a{
    text-decoration:none;
    color:var(--text-main);
    font-weight:500;
}

.btn-premium{
    background:linear-gradient(135deg,var(--accent-2),var(--accent-3));
    padding:10px 22px;
    border-radius:30px;
    color:white !important;
}

/* THEME BUTTON */
.theme-toggle{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:var(--text-main);
}

/* HERO */
.hero{
    text-align:center;
    margin-bottom:40px;
}

.hero h1{
    font-size:3rem;
    margin-bottom:10px;
}

.hero p{
    color:var(--text-muted);
    max-width:700px;
    margin:auto;
}

/* CARD */
.card{
    max-width:780px;
    margin:auto;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

/* ICON */
.icon{
    width:90px;
    height:90px;
    margin:auto;
    margin-bottom:25px;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(34,197,94,.12);
}

.icon i{
    font-size:40px;
    color:var(--accent-1);
}

/* FILE INPUT */
.file-label{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:20px;
    border-radius:18px;
    border:2px dashed rgba(56,189,248,.35);
    background:rgba(255,255,255,.03);
    cursor:pointer;
    transition:.3s;
}

.file-label:hover{
    border-color:var(--accent-1);
    transform:translateY(-2px);
}

input[type="file"]{
    display:none;
}

/* BUTTON */
.btn{
    width:100%;
    margin-top:20px;
    padding:18px;
    border:none;
    border-radius:16px;
    font-weight:700;
    cursor:pointer;
    color:white;
    background:linear-gradient(var(--accent-1), var(--accent-2), var(--accent-3));
}

/* FEATURES */
.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
    margin-top:35px;
}

.feature{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    padding:18px;
    border-radius:18px;
}

.feature i{
    color:var(--accent-1);
    margin-bottom:10px;
}

/* FOOTER */
footer{
    margin-top:100px;
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
}

</style>

</head>

<body>

<!-- GLOWS -->
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<div class="workspace">

<!-- NAV -->
<nav class="glass-nav">
    <a href="/" class="nav-brand">
        <i class="fa-solid fa-shapes"></i>
        GoFormate
    </a>

    <div class="nav-controls">
        <a href="/">Home</a>
        <button class="theme-toggle" id="themeToggle">
            <i class="fa-solid fa-sun" id="themeIcon"></i>
        </button>
        <a href="/form" class="btn-premium">Build CV</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Excel to PDF Converter</h1>
    <p>Convert your Excel files into clean, professional PDF documents instantly.</p>
</div>

<!-- CARD -->
<div class="card">

    <div class="icon">
        <i class="fa-solid fa-file-excel"></i>
    </div>

    <form method="POST" enctype="multipart/form-data">

        <label class="file-label">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span id="fileText">Choose Excel File</span>
            <input type="file" id="fileInput" name="file" accept=".xls,.xlsx">
        </label>

        <button class="btn">
            Convert Now
        </button>

    </form>

    <div class="features">

        <div class="feature">
            <i class="fa-solid fa-bolt"></i>
            <h3>Fast</h3>
        </div>

        <div class="feature">
            <i class="fa-solid fa-lock"></i>
            <h3>Secure</h3>
        </div>

        <div class="feature">
            <i class="fa-solid fa-table"></i>
            <h3>Accurate</h3>
        </div>

    </div>

</div>

<!-- FOOTER -->
<footer>
    © 2026 GoFormate — All rights reserved
</footer>

</div>

<script>

/* THEME */
const btn = document.getElementById('themeToggle');
const icon = document.getElementById('themeIcon');

if(localStorage.getItem('theme')==='light'){
    document.body.classList.add('light-mode');
    icon.classList.replace('fa-sun','fa-moon');
}

btn.addEventListener('click',()=>{
    document.body.classList.toggle('light-mode');

    if(document.body.classList.contains('light-mode')){
        icon.classList.replace('fa-sun','fa-moon');
        localStorage.setItem('theme','light');
    }else{
        icon.classList.replace('fa-moon','fa-sun');
        localStorage.setItem('theme','dark');
    }
});

/* file name */
const fileInput=document.getElementById('fileInput');
const fileText=document.getElementById('fileText');

fileInput.addEventListener('change',()=>{
    fileText.textContent=fileInput.files[0]?.name || "Choose Excel File";
});

</script>

</body>
</html>
