<h1>Compress Image Online Free</h1>
<p>Reduce JPG, PNG, JPEG and WEBP image size instantly without losing quality. Fast, secure and free image compression with GoFormate.</p>

<br>

<form method="POST" enctype="multipart/form-data" action="/compress">
<input
type="file"
name="file"
id="imageInput"
accept=".jpg,.jpeg,.png,.webp"
required
hidden
>

<label for="imageInput" class="file-label">
<i class="fa-solid fa-cloud-arrow-up"></i>
<span id="fileText">Choose Image File</span>
</label>

<button type="submit" class="submit-btn">
<i class="fa-solid fa-image"></i> Compress Image
</button>
</form>

<div class="features">
<div class="feature">
<i class="fa-solid fa-image"></i>
<h3>Compress Images</h3>
</div>

<div class="feature">
<i class="fa-solid fa-bolt"></i>
<h3>Fast</h3>
</div>

<div class="feature">
<i class="fa-solid fa-shield"></i>
<h3>Secure</h3>
</div>
</div>

<script>
const themeToggleBtn = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');

if(localStorage.getItem('theme') === 'light'){
    document.body.classList.add('light-mode');
    themeIcon.classList.replace('fa-sun','fa-moon');
}

themeToggleBtn.addEventListener('click',()=>{
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');

    themeIcon.classList.replace(
        isLight ? 'fa-sun' : 'fa-moon',
        isLight ? 'fa-moon' : 'fa-sun'
    );

    localStorage.setItem('theme', isLight ? 'light' : 'dark');
});

const imageInput = document.getElementById('imageInput');
const fileText = document.getElementById('fileText');

imageInput.addEventListener('change', function(){
    fileText.textContent =
        this.files.length > 0
        ? this.files[0].name
        : "Choose Image File";
});
</script>
