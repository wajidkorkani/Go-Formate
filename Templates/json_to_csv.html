<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>JSON to CSV Converter | MyCVSite</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/x-icon">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(rgba(15,23,42,0.92),
            rgba(15,23,42,0.92)),
            url('/static/images/slider5.jpg');

            background-size:cover;
            background-position:center;

            color:white;
        }


        /* PAGE WRAPPER */

        .wrapper{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding-top:90px;
        }

        /* CARD */

        .card{

            width:100%;
            max-width:450px;

            background:rgba(15,23,42,0.75);

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(14px);

            border-radius:28px;

            padding:40px;

            text-align:center;

            box-shadow:0 25px 60px rgba(0,0,0,0.45);
        }

        .icon{

            width:85px;
            height:85px;

            margin:auto;
            margin-bottom:20px;

            border-radius:22px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:rgba(34,197,94,0.12);
        }

        .icon i{

            font-size:38px;
            color:#22c55e;
        }

        h1{

            font-size:1.8rem;

            margin-bottom:20px;
        }

        .error{

            background:rgba(239,68,68,0.15);

            color:#fecaca;

            padding:12px;

            border-radius:12px;

            margin-bottom:15px;

            font-size:14px;
        }

        p.desc{

            font-size:13px;

            color:#cbd5e1;

            margin-bottom:20px;
        }

        /* FILE INPUT */

        .file-box{
            margin-bottom:20px;
        }

        .file-label{

            width:100%;

            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;

            padding:20px;

            border-radius:18px;

            background:#1e293b;

            border:2px dashed rgba(34,197,94,0.35);

            color:#cbd5e1;

            cursor:pointer;

            transition:0.3s;
        }

        .file-label:hover{

            background:#243447;

            border-color:#22c55e;

            transform:translateY(-2px);
        }

        .file-label i{
            color:#22c55e;
        }

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:16px;

            cursor:pointer;

            font-size:1rem;

            font-weight:bold;

            color:white;

            background:linear-gradient(135deg,#22c55e,#16a34a);

            box-shadow:0 15px 35px rgba(34,197,94,0.3);

            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
        }

        .note{

            font-size:12px;

            color:#94a3b8;

            margin-top:15px;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .nav-container{
                flex-direction:column;
                gap:10px;
            }

        }

    </style>

</head>

<body>

<!-- NAVBAR -->
{% include 'nav.html' %}
<!-- PAGE -->
<div class="wrapper">

    <div class="card">

        <div class="icon">
            <i class="fa-solid fa-file-csv"></i>
        </div>

        <h1>JSON to CSV Converter</h1>

        <p class="desc">
            Upload a JSON file and convert it into CSV format instantly.
        </p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">

            <div class="file-box">

                <input type="file"
                id="jsonInput"
                name="file"
                accept=".json"
                hidden required>

                <label for="jsonInput" class="file-label">

                    <i class="fa-solid fa-cloud-arrow-up"></i>

                    <span id="fileText">Choose JSON File</span>

                </label>

            </div>

            <button type="submit">
                Convert & Download CSV
            </button>

        </form>

        <div class="note">
            Only valid JSON arrays are supported.
        </div>

    </div>

</div>

<script>

    const jsonInput =
    document.getElementById('jsonInput');

    const fileText =
    document.getElementById('fileText');

    jsonInput.addEventListener('change', function(){

        fileText.textContent =
        this.files.length
        ? this.files[0].name
        : "Choose JSON File";

    });

</script>

</body>
</html>
