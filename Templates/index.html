<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MyCVSite - Smart Online Tools</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/x-icon">

    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            background:#0b0e18;
            color:white;
            overflow-x:hidden;
        }

        /* NAVBAR */

        nav{
            width:100%;
            position:fixed;
            top:0;
            left:0;
            z-index:1000;
            backdrop-filter: blur(12px);
            background: rgba(250,250,250,0.04);
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .nav-container{
            width:90%;
            margin:auto;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:18px 0;
        }

        .logo a{
            text-decoration:none;
            color:#0ea5e9;
            font-size:1.6rem;
            font-weight:bold;
        }

        .nav-links{
            display:flex;
            align-items:center;
            gap:25px;
        }

        .nav-links a{
            text-decoration:none;
            color:white;
            font-size:15px;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#38bdf8;
        }

        .generate-btn{
            background:linear-gradient(135deg,#38bdf8,#0ea5e9) !important;
            padding:12px 22px !important;
            border-radius:10px !important;
            color:white !important;
            font-weight:bold !important;
            box-shadow:0 8px 25px rgba(14,165,233,0.35) !important;
            border:none !important;
        }

        .generate-btn:hover{
            background:linear-gradient(135deg,#38bdf8,#38bdf8,#0ea5e9) !important;
        }

        .menu-toggle{
            display:none;
            flex-direction:column;
            gap:5px;
            background:none;
            border:none;
            cursor:pointer;
        }

        .bar{
            width:25px;
            height:3px;
            background:white;
            border-radius:10px;
        }

        /* HERO */

        .slider{
            width:100%;
            height:100vh;
            background-size:cover;
            background-position:center;
            position:relative;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:1s ease-in-out;
        }

        .slider::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.55);
        }

        .hero-content{
            position:relative;
            z-index:10;
            text-align:center;
            width:90%;
            max-width:800px;
        }

        .hero-content h1{
            font-size:4rem;
            margin-bottom:20px;
            line-height:1.2;
        }

        .hero-content p{
            font-size:1.1rem;
            color:#d1d5db;
            margin-bottom:35px;
            line-height:1.8;
        }

        .hero-buttons{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
        }

        .hero-buttons a{
            text-decoration:none;
            padding:14px 28px;
            border-radius:12px;
            font-weight:bold;
            transition:0.3s;
        }

        .primary-btn{
            background:linear-gradient(100deg,#59cdff, rgb(0, 166, 255));
            color:white;
        }

        .secondary-btn{
            border:1px solid rgba(255,255,255,0.2);
            color:white;
            background:rgba(255,255,255,0.05);
        }

        .primary-btn:hover,
        .secondary-btn:hover{
            transform:translateY(-3px);
        }

        /* SLIDER BUTTONS */

        .btn button{
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            z-index:50;
            width:55px;
            height:55px;
            border:none;
            border-radius:50%;
            background:rgba(255,255,255,0.15);
            color:white;
            font-size:20px;
            cursor:pointer;
            backdrop-filter: blur(8px);
            transition:0.3s;
        }

        .btn button:hover{
            background:#38bdf8;
        }

        .prev{
            left:30px;
        }

        .next{
            right:30px;
        }

        /* SECTION */

        .main-content{
            width:90%;
            margin:auto;
            padding:100px 0;
        }

        .section-title{
            text-align:center;
            font-size:2.5rem;
            margin-bottom:60px;
        }

        .tool-cards-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:30px;
        }

        .tool-card{
            text-decoration:none;
            color:white;
            background-color:#0b0e18;
            padding:35px 28px;
            border-radius:22px;
            transition:0.4s;
            border:1px solid rgba(255,255,255,0.06);
            position:relative;
            overflow:hidden;
        }

        .tool-card::before{
            content:'';
            position:absolute;
            width:180px;
            height:180px;
            background:rgba(56,189,248,0.08);
            border-radius:50%;
            top:-60px;
            right:-60px;
        }

        .tool-card:hover{
            transform:translateY(-10px);
            border-color:#38bdf8;
            box-shadow:0 15px 40px rgba(56,189,248,0.2);
        }

        .icon-wrapper{
            width:70px;
            height:70px;
            border-radius:18px;
            background:rgba(56,189,248,0.12);
            display:flex;
            align-items:center;
            justify-content:center;
            margin-bottom:25px;
        }

        .icon-wrapper i{
            font-size:30px;
            color:#38bdf8;
        }

        .tool-card h3{
            font-size:1.3rem;
            color:rgba(255,255,255,0.95);
            margin-bottom:12px;
        }

        .tool-card p{
            color:#898b8e;
            line-height:1.7;
            margin-bottom:20px;
        }

        .card-link-text{
            color:#38bdf8;
            font-weight:bold;
        }

        /* FOOTER */

        footer{
            background:#020617;
            padding:40px 20px;
            text-align:center;
            border-top:1px solid rgba(255,255,255,0.06);
        }

        footer p{
            color:#94a3b8;
        }

        /* MOBILE */

        @media(max-width:768px){

            .menu-toggle{
                display:flex;
            }

            .nav-links{
                position:absolute;
                top:75px;
                left:0;
                width:100%;
                background:#0f172a;
                flex-direction:column;
                align-items:flex-start;
                padding:20px;
                display:none;
                gap:20px;
            }

            .nav-links.active{
                display:flex;
            }

            .nav-links a{
                width:100%;
            }

            .generate-btn{
                width:100%;
                text-align:center;
            }

            .hero-content h1{
                font-size:2.5rem;
            }

            .hero-content p{
                font-size:1rem;
            }

            .btn button{
                width:45px;
                height:45px;
            }

            .section-title{
                font-size:2rem;
            }

        }

    </style>
</head>

<body>

<!-- NAVBAR -->

<nav>

    <div class="nav-container">

        <div class="logo">
            <a href="/">GoFormate</a>
        </div>

        <button class="menu-toggle">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <div class="nav-links">

            <a href="/">Home</a>

            <a href="/qr">QR</a>

            <a href="/form" class="generate-btn">
                Generate CV
            </a>

        </div>

    </div>

</nav>

<br><br><br><br>

<!-- HERO SECTION -->

<div class="slider">

    <div class="hero-content">

        <h1>
            Professional Online Tools & CV Generator
        </h1>

        <p>
            Convert files, generate QR codes, create professional CVs,
            and use multiple smart tools — all in one modern platform.
        </p>

        <div class="hero-buttons">

            <a href="/form" class="primary-btn">
                Create CV
            </a>

            <a href="#tools" class="secondary-btn">
                Explore Tools
            </a>

        </div>

    </div>

    <div class="btn">
        <button class="prev" onclick="Decrease()">❮</button>
    </div>

    <div class="btn">
        <button class="next" onclick="Increase()">❯</button>
    </div>

</div>

<!-- TOOLS -->

<div class="main-content" id="tools">

    <h2 class="section-title">
        ✨ Featured Tools
    </h2>

    <div class="tool-cards-container"></div>

</div>

<!-- FOOTER -->

<footer>
    <p>
        © 2026 GoFormate — Designed & Developed by Wajid Korkani
    </p>
</footer>

<script>

    // IMAGE SLIDER

    const images = [
        "/static/images/slider1.jpg",
        "/static/images/slider2.jpg",
        "/static/images/slider3.jpg",
        "/static/images/slider4.jpg",
        "/static/images/slider5.jpg"
    ];

    let imgTag = document.querySelector('.slider');
    let i = 0;

    function Increase(){
        i++;
        slider();
    }

    function Decrease(){
        i--;
        slider();
    }

    function slider(){

        if(i >= images.length){
            i = 0;
        }

        if(i < 0){
            i = images.length - 1;
        }

        imgTag.style.backgroundImage = `url('${images[i]}')`;
    }

    document.addEventListener('DOMContentLoaded', slider);

    setInterval(Increase, 5000);

    // MOBILE NAV

    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    if(menuToggle && navLinks){

        menuToggle.addEventListener('click', () => {

            navLinks.classList.toggle('active');

        });

    }

    // TOOL CARDS

    const toolCardsContainer = document.querySelector('.tool-cards-container');

    const toolLinks = [

        {
            href:"/jpg-to-pdf",
            text:"JPG to PDF",
            icon:"fa-solid fa-file-image",
            description:"Convert image files into professional PDF documents."
        },

        {
            href:"/pdf-to-jpg",
            text:"PDF to JPG",
            icon:"fa-solid fa-file-pdf",
            description:"Extract high quality images from PDF files."
        },

        {
            href:"/pdf-to-docx",
            text:"PDF to DOCX",
            icon:"fa-solid fa-file-word",
            description:"Convert PDFs into editable Word documents."
        },

        {
            href:"/jpg-to-ico",
            text:"JPG to ICO",
            icon:"fa-solid fa-icons",
            description:"Generate favicon ICO files for websites and apps."
        },

        {
            href:"/ppt-to-pdf",
            text:"PPT to PDF",
            icon:"fa-solid fa-file-powerpoint",
            description:"Convert presentations into portable PDF format."
        },

        {
            href:"/excel-to-pdf",
            text:"Excel to PDF",
            icon:"fa-solid fa-file-excel",
            description:"Turn Excel spreadsheets into printable PDFs."
        },

        {
            href:"/json-to-csv",
            text:"JSON to CSV",
            icon:"fa-solid fa-file-csv",
            description:"Convert structured JSON data into CSV files."
        },

        {
            href:"/qr",
            text:"QR Generator",
            icon:"fa-solid fa-qrcode",
            description:"Generate stylish QR codes instantly."
        },

        {
            href:"/form",
            text:"Generate CV",
            icon:"fa-solid fa-file-lines",
            description:"Create modern professional CVs in minutes."
        }

    ];

    toolLinks.forEach(tool => {

        const card = document.createElement('a');

        card.href = tool.href;

        card.classList.add('tool-card');

        card.innerHTML = `
            <div class="icon-wrapper">
                <i class="${tool.icon}"></i>
            </div>

            <h3>${tool.text}</h3>

            <p>${tool.description}</p>

            <span class="card-link-text">
                Use Tool →
            </span>
        `;

        toolCardsContainer.appendChild(card);

    });

</script>

</body>
</html>
