    <style>
        :root {
            --bg-main:#050505; --nav-bg:rgba(15,15,15,.6); --card-bg:rgba(255,255,255,.03);
            --card-border:rgba(255,255,255,.08); --text-main:#ffffff; --text-muted:#8892b0;
            --accent-1:orange; --accent-2:orangered; --accent-3:red;
        }
        body.light-mode {
            --bg-main:#f0f4f8; --nav-bg:rgba(255,255,255,.7); --card-bg:rgba(255,255,255,.8);
            --card-border:rgba(0,0,0,.08); --text-main:#0f172a; --text-muted:#475569;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body { background:var(--bg-main); color:var(--text-main); min-height:100vh; transition:.35s ease; }

        /* Ambient Glows */
        .ambient-glow { position:fixed; border-radius:50%; filter:blur(150px); z-index:-1; opacity:.35; }
        .glow-1 { top:-10%; left:-10%; width:45vw; height:45vw; background:rgba(0,242,254,.15); }
        .glow-2 { bottom:-20%; right:-10%; width:55vw; height:55vw; background:rgba(240,147,251,.15); }

        .workspace { max-width:800px; margin:auto; padding:20px 20px 80px; }

        /* Navigation Styles */
        .glass-nav { position:sticky; top:20px; z-index:100; background:var(--nav-bg); backdrop-filter:blur(20px); border:1px solid var(--card-border); border-radius:50px; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; margin-bottom:50px; width: 90%;}
        .nav-brand { font-size:1.5rem; font-weight:800; background:linear-gradient(to right,var(--accent-1),var(--accent-3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-decoration:none; display:flex; align-items:center; gap:10px; }
        .nav-controls { display:flex; align-items:center; gap:18px; }
        .nav-link { color:var(--text-main); text-decoration:none; font-weight:500; transition:.25s; }
        .nav-link:hover { color:var(--accent-1); }
        .btn-premium { background:linear-gradient(135deg,var(--accent-2),var(--accent-3)); padding:10px 22px; border-radius:30px; color:#fff; text-decoration:none; font-weight:600; border:none; }
        .theme-toggle { background:var(--card-bg); border:1px solid var(--card-border); color:var(--text-main); width:42px; height:42px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.3s; }
        .theme-toggle:hover { color:var(--accent-1); }

        

        /* Converter Card */
        .converter-card { background:var(--card-bg); border:1px solid var(--card-border); backdrop-filter:blur(18px); border-radius:28px; padding:45px; text-align:center; box-shadow:0 15px 50px rgba(0,0,0,.25); }
        .icon { width:95px; height:95px; margin:auto; margin-bottom:25px; border-radius:24px; display:flex; align-items:center; justify-content:center; background:rgba(0,242,254,0.1); color:var(--accent-1); font-size:42px; }
        .file-label { display:flex; align-items:center; justify-content:center; gap:12px; padding:20px; border-radius:18px; border:2px dashed var(--accent-1); cursor:pointer; transition:0.3s; margin-bottom:25px; color:var(--text-muted); }

        .submit-btn { width:100%; border:none; padding:18px; border-radius:16px; cursor:pointer; font-size:1rem; font-weight:bold; color:white; background:linear-gradient(135deg,var(--accent-2),var(--accent-3)); transition:0.3s; }
        .submit-btn:hover { transform:translateY(-3px); }
        .features { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:18px; margin-top:35px; }
        .feature { background:var(--card-bg); padding:18px; border-radius:18px; border:1px solid var(--card-border); }

        .navDiv{
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;

<div class="ambient-glow glow-1"></div>

</div>

<style>

/* PAGE LOADER */
#pageLoader{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg-main);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity .6s ease, visibility .6s ease;
}

#pageLoader.hide{
    opacity: 0;
    visibility: hidden;
}

.loader-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.loader-icon{
    font-size: 8rem;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: spinPulse 1.6s infinite ease-in-out;
}

.loader-box p{
    color: var(--text-muted);
    font-size: 1rem;
    letter-spacing: .5px;
}

@keyframes spinPulse{
    0%{
        transform: rotate(0deg) scale(1);
        opacity:.7;
    }
    50%{
        transform: rotate(180deg) scale(1.25);
        opacity:1;
    }
    100%{
        transform: rotate(360deg) scale(1);
        opacity:.7;
    }
}

</style>

<div id="pageLoader">
    <div class="loader-box">
        <i class="fa-solid fa-shapes loader-icon"></i>
        <p>Loading GoFormate...</p>
    </div>
</div>

<script>

/* PAGE LOADER */
window.addEventListener("load", () => {
    const loader = document.getElementById("pageLoader");

    setTimeout(() => {
        loader.classList.add("hide");
    }, 800);
});

</script>

<script>
    const themeToggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    if(localStorage.getItem('theme') === 'light'){ document.body.classList.add('light-mode'); themeIcon.classList.replace('fa-sun','fa-moon'); }
    themeToggleBtn.addEventListener('click',()=>{
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        themeIcon.classList.replace(isLight ? 'fa-sun' : 'fa-moon', isLight ? 'fa-moon' : 'fa-sun');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    const pptInput = document.getElementById('pptInput');
    const fileText = document.getElementById('fileText');
    pptInput.addEventListener('change', function(){
        fileText.textContent = this.files.length > 0 ? this.files[0].name : "Choose PPT or PPTX File";
    });
</script>
</body>
