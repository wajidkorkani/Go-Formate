<link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/x-icon">

<style>
    nav{
        width:100%;
        position:fixed;
        top:0;
        left:0;
        z-index:1000;
        backdrop-filter: blur(12px);
        background: rgba(250,250,250,0.04);
        border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .nav-container{
        width:90%;
        margin:auto;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:18px 0;
    }

    .logo{
        font-size:1.6rem;
        font-weight:bold;
        display:flex;
        align-items:center;
        gap:10px;
        color:#38bdf8;
    }

    .logo img{
        width:200px;
        max-width:100%;
    }

    .nav-links{
        display:flex;
        align-items:center;
        gap:25px;
    }

    .nav-links a,
    .dropdown-btn{
        text-decoration:none;
        color:white;
        font-size:15px;
        background:none;
        border:none;
        cursor:pointer;
        transition:0.3s;
    }

    .nav-links a:hover,
    .dropdown-btn:hover{
        color:#38bdf8;
    }

    .generate-btn{
        background:linear-gradient(135deg,#38bdf8,#0ea5e9) !important;
        padding:12px 22px !important;
        border-radius:10px !important;
        color:white !important;
        font-weight:bold !important;
        box-shadow:0 8px 25px rgba(14,165,233,0.35) !important;
        border:none !important;
    }

    .generate-btn:hover{
        background:linear-gradient(135deg,#38bdf8,#38bdf8,#0ea5e9) !important;
    }

    .dropdown{
        position:relative;
    }

    .dropdown-content{
        position:absolute;
        top:40px;
        left:0;
        backdrop-filter: blur(120px);
        background: rgba(250,250,250,0.1);
        min-width:220px;
        border-radius:12px;
        overflow:hidden;
        display:none;
    }

    .dropdown-content a{
        display:block;
        padding:14px;
        backdrop-filter: blur(12px);
        background: rgba(250,250,250,0.04);
    }

    .dropdown:hover .dropdown-content{
        display:block;
    }

    .menu-toggle{
        display:none;
        flex-direction:column;
        gap:5px;
        background:none;
        border:none;
        cursor:pointer;
    }

    .bar{
        width:25px;
        height:3px;
        background:white;
        border-radius:10px;
    }

    /* MOBILE RESPONSIVE */
    @media(max-width:768px){

        .nav-container{
            width:92%;
            padding:15px 0;
        }

        .logo{
            font-size:1.3rem;
        }

        .menu-toggle{
            display:flex;
        }

        .nav-links{
            position:absolute;
            top:100%;
            left:0;
            width:100%;
            display:none;
            flex-direction:column;
            align-items:flex-start;
            gap:18px;
            padding:20px;
            background:rgba(15,23,42,0.95);
            backdrop-filter:blur(15px);
            border-top:1px solid rgba(255,255,255,0.08);
        }

        .nav-links.active{
            display:flex;
        }

        .nav-links a{
            width:100%;
            font-size:16px;
        }

        .generate-btn{
            width:100%;
            text-align:center;
        }
    }
</style>

<nav>
    <div class="nav-container">

        <div class="logo">
            <a href="/" class="GoFormate" style="text-decoration: none; color: #0ea5e9">
                GoFormate
            </a>
        </div>

        <button class="menu-toggle" id="menuToggle">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <div class="nav-links" id="navLinks">

            <a href="/">Home</a>

            <a href="/qr">QR</a>

            <a href="/form" class="generate-btn">Generate CV</a>

        </div>
    </div>
</nav>

<script>
    const menuToggle = document.getElementById("menuToggle");
    const navLinks = document.getElementById("navLinks");

    menuToggle.addEventListener("click", () => {
        navLinks.classList.toggle("active");
    });
</script>
