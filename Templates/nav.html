<link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/x-icon">


<style>
        nav{
            width:100%;
            position:fixed;
            top:0;
            left:0;
            z-index:1000;
            backdrop-filter: blur(12px);
            background:rgba(15,23,42,0.75);
            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .nav-container{
            width:90%;
            margin:auto;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:18px 0;
        }

        .logo{
            font-size:1.6rem;
            font-weight:bold;
            display:flex;
            align-items:center;
            gap:10px;
            color:#38bdf8;
        }

        .logo img{
            width:200px;
        }

        .nav-links{
            display:flex;
            align-items:center;
            gap:25px;
        }

        .nav-links a,
        .dropdown-btn{
            text-decoration:none;
            color:white;
            font-size:15px;
            background:none;
            border:none;
            cursor:pointer;
            transition:0.3s;
        }

        .nav-links a:hover,
        .dropdown-btn:hover{
            color:#38bdf8;
        }

        .generate-btn{
            background:linear-gradient(135deg,#38bdf8,#0ea5e9, blue) !important;
            padding:12px 22px !important;
            border-radius:10px !important;
            color:white !important;
            font-weight:bold !important;
            box-shadow:0 8px 25px rgba(14,165,233,0.35) !important;
            border: none !important;
        }

        .generate-btn:hover{
            background:linear-gradient(135deg, blue, #38bdf8,#0ea5e9) !important;
            padding:12px 22px !important;
            border-radius:10px !important;
            color:white !important;
            font-weight:bold !important;
            box-shadow:0 8px 25px rgba(14,165,233,0.35) !important;
            border: none !important;
        }

        .dropdown{
            position:relative;
        }

        .dropdown-content{
            position:absolute;
            top:40px;
            left:0;
            background:#1e293b;
            min-width:220px;
            border-radius:12px;
            overflow:hidden;
            display:none;
            box-shadow:0 15px 40px rgba(0,0,0,0.4);
        }

        .dropdown-content a{
            display:block;
            padding:14px;
            border-bottom:1px solid rgba(255,255,255,0.05);
        }

        .dropdown:hover .dropdown-content{
            display:block;
        }

        .menu-toggle{
            display:none;
            flex-direction:column;
            gap:5px;
            background:none;
            border:none;
            cursor:pointer;
        }

        .bar{
            width:25px;
            height:3px;
            background:white;
            border-radius:10px;
        }
</style>

<nav>
    <div class="nav-container">

        <div class="logo">
            <a href="/">
                <img src="{{ url_for('static', filename='images/name.png') }}" alt="Go Formate">
            </a>
        </div>

        <button class="menu-toggle">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <div class="nav-links">

            <a href="/">Home</a>

            <div class="dropdown">
                <button class="dropdown-btn">
                    Tools <i class="fa-solid fa-angle-down"></i>
                </button>

                <div class="dropdown-content">
                    <a href="/jpg-to-pdf">JPG to PDF</a>
                    <a href="/pdf-to-jpg">PDF to JPG</a>
                    <a href="/pdf-to-docx">PDF to DOCX</a>
                    <a href="/jpg-to-ico">JPG to ICO</a>
                    <a href="/ppt-to-pdf">PPT to PDF</a>
                    <a href="/excel-to-pdf">Excel to PDF</a>
                    <a href="/json-to-csv">JSON to CSV</a>
                </div>
            </div>

            <a href="/qr">QR</a>
            <a href="/form" class="generate-btn">Generate CV</a>

        </div>
    </div>
